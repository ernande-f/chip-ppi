<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CHIP - Marketplace</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --primary-orange: #f2a94a;
            --bg-light: #f9f9f9;
            --text-brown: #5d4037;
            --card-bg: #f4f4f4;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: white;
            margin: 0;
            color: var(--text-brown);
        }

        /* --- Header / Navbar --- */
        .navbar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 24px;
            padding: 18px 5%;
            border-bottom: 1px solid #eee;
            font-family: 'Inter', sans-serif;
        }

        .logo-container a {
            display: block;
            text-decoration: none;
        }

        .logo-img {
            height: 55px;
            width: auto;
            display: block;
        }

        .search-bar {
            flex: 1;
            display: flex;
            justify-content: center;
            min-width: 0;
        }

        .search-bar input {
            width: min(100%, 420px);
            padding: 10px 16px;
            border-radius: 10px;
            border: 1px solid #d2d2d2;
            background-color: var(--bg-light);
            outline: none;
            transition: border-color 0.2s, box-shadow 0.2s;
        }

        .search-bar input:focus {
            border-color: #e0a33f;
            box-shadow: 0 0 0 3px rgba(242, 169, 74, 0.12);
        }

        .nav-links {
            display: flex;
            align-items: center;
            gap: 30px;
            flex-shrink: 0;
        }

        .nav-link-item {
            text-decoration: none;
            color: inherit;
            display: flex;
            align-items: center;
        }

        .nav-text-bold {
            font-weight: 700;
            color: #54320f;
            font-size: 1.05rem;
        }

        .sino-img {
            width: 55px;
            height: auto;
            display: block;
            cursor: pointer;
        }

        .profile-pic {
            width: 44px;
            height: 44px;
            background: #f0f0f0;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            border: 1px solid #e0e0e0;
            transition: transform 0.2s;
            color: #54320f;
            font-weight: 700;
        }

        .profile-pic:hover {
            transform: scale(1.05);
        }

        /* --- Conteúdo --- */
        .container {
            padding: 40px 8%;
        }

        .results-count {
            font-size: 1.1rem;
            margin-bottom: 25px;
            font-weight: bold;
        }

        /* --- Grid e Cards --- */
        .product-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(420px, 1fr));
            gap: 25px;
        }

        .product-card {
            display: flex;
            background-color: var(--card-bg);
            border-radius: 15px;
            overflow: hidden;
            height: 190px;
        }

        .product-image-box {
            width: 45%;
            position: relative;
            background-color: #ddd; /* fallback */
        }

        .product-image-box img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            /* Corte diagonal na imagem */
            clip-path: polygon(0 0, 100% 0, 80% 100%, 0% 100%);
        }

        .product-info {
            padding: 20px;
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .product-info h3 {
            margin: 0;
            color: var(--primary-orange);
            font-size: 1.4rem;
        }

        .stock-text {
            font-size: 0.8rem;
            margin: 5px 0 15px 0;
            color: #333;
        }

        .detail-text {
            font-size: 0.95rem;
            color: #777;
            margin: 2px 0;
        }

        .add-btn {
            margin-top: 15px;
            background-color: var(--primary-orange);
            border: none;
            color: white;
            padding: 8px;
            border-radius: 8px;
            font-size: 1.5rem;
            font-weight: bold;
            cursor: pointer;
            width: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            line-height: 1;
        }

        .add-btn:hover {
            filter: brightness(0.9);
        }

        /* Responsividade para Telas Pequenas */
        @media (max-width: 600px) {
            .product-grid { grid-template-columns: 1fr; }
            .navbar { padding: 15px; flex-wrap: wrap; justify-content: center; }
            .search-bar { width: 100%; order: 3; justify-content: stretch; }
            .search-bar input { width: 100%; }
        }
    </style>
</head>
<body>

    <header class="navbar">
        <div class="logo-container">
            <a href="/">
                <img src="../assets/logo.png" alt="Logo CHIP" class="logo-img">
            </a>
        </div>
        
        <div class="search-bar">
            <input type="text" placeholder="Pesquisar por cor, tipo, nome...">
        </div>

        <div class="nav-links">
            <a href="/pedidos" class="nav-link-item">
                <span class="nav-text-bold">Seus pedidos</span>
            </a>
            <div class="icon-notification">
                <img src="../assets/sino.png" alt="Notificações" class="sino-img">
            </div>
            <a href="/perfil" class="nav-link-item">
                <div class="profile-pic">
                    <span id="headerAvatar">CH</span>
                </div>
            </a>
        </div>
    </header>

    <main class="container">
        <div class="results-count">03 resultados encontrados</div>

        <div class="product-grid">
            
            <div class="product-card">
                <div class="product-image-box">
                    <img src="../assets/resistor.png" alt="Arduino">
                </div>
                <div class="product-info">
                    <h3>Resistor</h3>
                    <p class="stock-text">Quantidade disponível: <strong>09</strong></p>
                    <p class="detail-text">Categoria: categoria</p>
                    <p class="detail-text">Cor: cores</p>
                    <button class="add-btn">+</button>
                </div>
            </div>

            <div class="product-card">
                <div class="product-image-box">
                    <img src="../assets/resistor.png" alt="Arduino">
                </div>
                <div class="product-info">
                    <h3>Resistor</h3>
                    <p class="stock-text">Quantidade disponível: 09</p>
                    <p class="detail-text">Categoria: categoria</p>
                    <p class="detail-text">Cor: cores</p>
                    <button class="add-btn">+</button>
                </div>
            </div>

            <div class="product-card">
                <div class="product-image-box">
                    <img src="../assets/resistor.png" alt="Arduino">
                </div>
                <div class="product-info">
                    <h3>Resistor</h3>
                    <p class="stock-text">Quantidade disponível: 09</p>
                    <p class="detail-text">Categoria: categoria</p>
                    <p class="detail-text">Cor: cores</p>
                    <button class="add-btn">+</button>
                </div>
            </div>

        </div>
    </main>

    <script type="module" src="../js/header-avatar.js"></script>

</body>
</html>
