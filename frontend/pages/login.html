<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - CHIP IFFar</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap');

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', sans-serif;
        }

        body, html {
            height: 100%;
            overflow: hidden;
        }

        .container {
            display: flex;
            height: 100vh;
            width: 100vw;
        }

        /* --- LADO ESQUERDO (AMARELO) --- */
        .left-side {
            width: 53%;
            position: relative;
            display: flex;
            flex-direction: column;
            padding: 60px;
            overflow: hidden;
        }

        .fundo-img {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            z-index: 0;
        }

        .brand-name {
            font-weight: 700;
            font-size: 24px;
            color: #000;
            z-index: 10;
            position: relative;
        }

        /* BOTÃO DE INFORMAÇÃO POSICIONADO CORRETAMENTE */
        .info-button {
            position: absolute;
            top: 60px;
            right: 40px;
            background: none;
            border: none;
            padding: 0;
            cursor: pointer;
            z-index: 10;
            outline: none;
            transition: transform 0.2s ease;
        }

        .info-icon {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 32px;
            height: 32px;
            border: 2px solid #000;
            border-radius: 50%;
            font-family: serif; 
            font-weight: bold;
            font-size: 20px;
            color: #000;
        }

        .info-button:hover { transform: scale(1.1); }

        /* FORMA GEOMÉTRICA */
        .shape-overlay {
            position: absolute;
            bottom: -5px;
            left: -5px;
            width: 450px;
            height: 750px;
            background-color: rgba(255, 255, 255, 0.1);
            clip-path: polygon(100% 100%, 100% 30%, 70% 0%, 0% 0%, 0% 100%);
            z-index: 1;
        }

        /* --- LADO DIREITO (BRANCO) --- */
        .right-side {
            background-color: #ffffff;
            width: 47%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            padding: 0 10%;
            position: relative;
        }

        .logo-iffar {
            position: absolute;
            top: 40px;
            right: 40px;
            width: 100px;
        }

        .welcome-text {
            font-size: 28px;
            font-weight: 700;
            margin-bottom: 10px;
        }

        .instruction-text {
            font-size: 14px;
            color: #555;
            font-weight: 600;
            margin-bottom: 30px;
        }

        .input-group { margin-bottom: 15px; }

        input {
            width: 100%;
            padding: 18px 20px;
            background-color: #e9e9e9;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            outline: none;
        }

        .btn-entrar {
            width: 180px;
            padding: 15px;
            background-color: #f7c36f;
            border: none;
            border-radius: 8px;
            font-size: 20px;
            font-weight: 600;
            color: #8d621f;
            cursor: pointer;
            margin-top: 20px;
            margin-bottom: 25px;
        }

        .footer-links {
            font-size: 14px;
            font-weight: 600;
            color: #000;
            line-height: 1.8;
        }

        .footer-links a { color: #000; text-decoration: underline; }

        @media (max-width: 768px) {
            .container { flex-direction: column; }
            .left-side, .right-side { width: 100%; height: 50vh; }
        }

        .btn-link {
             background: none;        
             border: none;            
             padding: 0;              
             font-family: inherit;    
             font-size: inherit;      
             font-weight: 600;        
             color: #000;             
             text-decoration: underline; 
             cursor: pointer;         
             display: inline;        
}


            .btn-link:hover {
                color: #555;
                text-decoration: none;
}

    </style>
</head>
<body>

    <div class="container">
        <div class="left-side">
            <img src="../assets/imagem_esquerda.png" alt="Foto de fundo" class="fundo-img">
            
            <div class="brand-name">CHIP</div>
            
            <button type="button" class="info-button" title="Mais informações">
                <span class="info-icon">i</span>
            </button>

            <div class="shape-overlay"></div>
        </div>

        <div class="right-side">
            <img src="../assets/logo.iffar.png" alt="Logo IFFar" class="logo-iffar">

            <h1 class="welcome-text">Bom te ver novamente!</h1>
            <p class="instruction-text">Preencha os campos para acessar sua conta.</p>

            <form>
                <div class="input-group">
                    <input type="email" placeholder="Email" required>
                </div>
                <div class="input-group">
                    <input type="password" placeholder="Senha" required>
                </div>
                <button type="submit" class="btn-entrar">Entrar</button>
            </form>

            <div class="footer-links">
                     Não tem conta? <button type="button" class="btn-link">Cadastrar-se</button><br>
                     Esqueceu sua senha? <button type="button" class="btn-link">Redefinir</button>
                </div>
            </div>
        </div>
    </div>

</body>
</html>
