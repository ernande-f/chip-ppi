<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Editar Perfil - CHIP</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="../css/editar-perfil.css">
</head>
<body>

    <div id="page-content">
        <header class="navbar">
            <div class="nav-left">
                <div class="logo-box">CHIP</div>
                <div class="search-container">
                    <i class="fa fa-search"></i>
                    <input type="text" placeholder="Pesquisar por cor, tipo, nome...">
                </div>
            </div>
            <div class="nav-right">
                <a href="#" class="nav-link">Seus pedidos</a>
                <button class="icon-btn"><i class="fa-regular fa-bell"></i></button>
                <div class="user-circle"><i class="fa-solid fa-user"></i></div>
            </div>
        </header>

        <main class="edit-container">
            <h1 class="page-title">Editar perfil</h1>
            <hr class="divider">

            <div class="edit-content">
                <div class="photo-column">
                    <div class="profile-avatar-large">
                        <i class="fa-solid fa-user"></i>
                        <button class="edit-photo-badge">
                            <i class="fa-solid fa-pencil"></i>
                        </button>
                    </div>
                </div>

                <div class="form-column">
                    <div class="form-header">
                        <span class="role-badge">Estudante</span>
                        <a href="javascript:void(0)" class="logout-link" onclick="toggleModal('modal-sair', true)">
                            <i class="fa-solid fa-arrow-right-from-bracket"></i> Sair
                        </a>
                    </div>

                    <form class="profile-form">
                        <div class="form-group">
                            <label>Nome:</label>
                            <input type="text" value="Maria da Silva">
                        </div>
                        <div class="form-group">
                            <label>Senha:</label>
                            <div class="input-with-button">
                                <input type="password" value="********" readonly>
                                <button type="button" class="redefine-btn" onclick="toggleModal('modal-redefinir', true)">Redefinir senha</button>
                            </div>
                        </div>
                        <div class="form-group">
                            <label>*Email:</label>
                            <input type="email" value="maria.99807@aluno.iffar.edu.br" readonly class="readonly-input">
                        </div>
                        <div class="form-group">
                            <label>*CPF:</label>
                            <input type="text" value="111.111.111-11" readonly class="readonly-input">
                        </div>
                        <div class="form-buttons">
                            <button type="submit" class="btn-save">Salvar alterações</button>
                            <button type="button" class="btn-cancel" onclick="toggleModal('modal-sair', true)">Cancelar</button>
                        </div>
                        <p class="form-footer-note">*Para alterar esses campos, fale com o administrador do sistema.</p>
                    </form>
                </div>
            </div>
        </main>
    </div>

    <div id="modal-redefinir" class="modal-overlay">
        <div class="modal-card">
            <div class="modal-header">
                <h2>Redefinir senha</h2>
                <button class="close-modal" onclick="toggleModal('modal-redefinir', false)">&times;</button>
            </div>
            <form class="modal-form">
                <div class="modal-input-group">
                    <label>Nova senha:</label>
                    <input type="password">
                </div>
                <div class="modal-input-group">
                    <label>Confirmar senha:</label>
                    <input type="password">
                </div>
                <button type="button" class="btn-save-modal" onclick="toggleModal('modal-redefinir', false)">Salvar</button>
            </form>
        </div>
    </div>

    <div id="modal-sair" class="modal-overlay">
        <div class="modal-card exit-card">
            <div class="modal-header exit-header">
                <div class="exit-title-group">
                    <i class="fa-solid fa-arrow-right-from-bracket"></i>
                    <h2>Sair</h2>
                </div>
            </div>
            <p class="exit-message">Você tem certeza que deseja fazer isso?</p>
            <div class="exit-buttons">
                <button class="btn-confirm-exit" onclick="window.location.href='login.html'">Confirmar</button>
                <button class="btn-cancel-exit" onclick="toggleModal('modal-sair', false)">Cancelar</button>
            </div>
        </div>
    </div>

    <script>
        function toggleModal(modalId, show) {
            const modal = document.getElementById(modalId);
            const page = document.getElementById('page-content');
            if(show) {
                modal.style.display = 'flex';
                page.classList.add('modal-active');
            } else {
                modal.style.display = 'none';
                // Só remove a película se não houver outro modal aberto
                page.classList.remove('modal-active');
            }
        }
    </script>
</body>
</html>
