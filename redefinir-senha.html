<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Redefinir Senha - CHIP IFFar</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap');

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', sans-serif;
        }

        body, html {
            height: 100%;
            overflow: hidden;
        }

        .container {
            display: flex;
            height: 100vh;
            width: 100vw;
        }

         /* --- LADO ESQUERDO (AMARELO) --- */
        .left-side {
            background-color: #eeb04b;
            width: 53%;
            position: relative;
            display: flex;
            flex-direction: column;
            padding: 60px;
            overflow: hidden; /* Garante que a forma geométrica não saia do limite */
        }

        .brand-name {
            font-weight: 700;
            font-size: 24px;
            color: #000;
            z-index: 10;
        }

        .info-button {
            position: absolute;
            top: 60px;
            right: 40px;
            background: none;
            border: none;
            cursor: pointer;
            z-index: 10;
        }

        .info-icon {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 32px;
            height: 32px;
            border: 2px solid #000;
            border-radius: 50%;
            font-weight: bold;
            font-size: 20px;
        }

        .shape-overlay {
            position: absolute;
            bottom: -5px;
            left: -5px;
            width: 450px;
            height: 750px;
            background-color: rgba(255, 255, 255, 0.1);
            clip-path: polygon(100% 100%, 100% 30%, 70% 0%, 0% 0%, 0% 100%);
            z-index: 1;
            border: 15px solid rgba(255, 255, 255, 0.1);
        }

        /* --- LADO DIREITO --- */
        .right-side {
            background-color: #ffffff;
            width: 47%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            padding: 0 10%;
            position: relative;
        }

        .logo-iffar {
            position: absolute;
            top: 40px;
            right: 40px;
            width: 100px;
        }

        .back-arrow {
            color: #eeb04b;
            font-size: 24px;
            text-decoration: none;
            margin-bottom: 10px;
            display: block;
        }

        .welcome-text {
            font-size: 28px;
            font-weight: 700;
            margin-bottom: 5px;
        }

        .instruction-text {
            font-size: 14px;
            color: #8d621f;
            font-weight: 600;
            margin-bottom: 25px;
        }

        input {
            width: 100%;
            padding: 18px 20px;
            background-color: #ededed;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            margin-bottom: 20px;
            outline: none;
        }

        .btn-enviar {
            width: 220px;
            padding: 15px;
            background-color: #f7c36f;
            border: none;
            border-radius: 8px;
            font-size: 18px;
            font-weight: 600;
            color: #8d621f;
            cursor: pointer;
            margin-bottom: 25px;
        }

        /* ESTILO DO BOTÃO QUE PARECE TEXTO */
        .footer-text {
            font-size: 14px;
            font-weight: 700;
            color: #000;
        }

        .btn-link {
            background: none;
            border: none;
            padding: 0;
            font-family: inherit;
            font-size: inherit;
            font-weight: 700;
            color: #000;
            text-decoration: underline;
            cursor: pointer;
            display: inline;
        }

        .btn-link:hover {
            color: #555;
        }

        @media (max-width: 768px) {
            .container { flex-direction: column; }
            .left-side, .right-side { width: 100%; height: 50vh; }
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="left-side">
            <div class="brand-name">CHIP</div>
             <button type="button" class="info-button" title="Mais informações">
                <span class="info-icon">i</span>
            </button>
            <div class="shape-overlay"></div>
        </div>

        <div class="right-side">
            <img src="logo.iffar.png" alt="Logo IFFar" class="logo-iffar">
            
            <a href="#" class="back-arrow">&larr;</a>

            <h1 class="welcome-text">Redefina sua senha</h1>
            <p class="instruction-text">As instruções serão enviadas por email para você!</p>

            <form>
                <input type="email" placeholder="Email" required>
                <br>
                <button type="submit" class="btn-enviar">Enviar email</button>
            </form>

            <div class="footer-text">
                O email não chegou? <button type="button" class="btn-link">Reenviar email</button>
            </div>
        </div>
    </div>

</body>
</html>
